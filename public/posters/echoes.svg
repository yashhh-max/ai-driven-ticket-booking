      <stop offset="0%" style="stop-color:#9b59b6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8e44ad;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="300" height="450" fill="url(#echoes_grad)"/>
  <text x="150" y="160" font-size="32" font-weight="bold" fill="white" text-anchor="middle" font-family="Arial">ECHOES OF</text>
